name: atc_freq
description: Worldwide airport ATC frequencies — search, favourites, and nearby airports.
version: 1.0.1+2
publish_to: none

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Database
  sqflite: ^2.2.8+4
  path: ^1.9.0
  path_provider: ^2.1.3

  # Networking & data
  http: ^1.2.1
  csv: ^6.0.0

  # Location
  geolocator: ^13.0.1

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # State management
  provider: ^6.1.2

  # Persistence
  shared_preferences: ^2.3.2

  # Background service & persistent notifications
  flutter_foreground_task: ^8.14.0
  flutter_local_notifications: ^17.2.3

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.3.0
  android_intent_plus: ^5.0.0
  package_info_plus: ^8.0.0
  sensors_plus: ^6.1.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0B1120"
  adaptive_icon_foreground: "assets/icon/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/icon/
