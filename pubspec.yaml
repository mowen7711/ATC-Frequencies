name: atc_freq
description: Worldwide airport ATC frequencies — search, favourites, and nearby airports.
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Database
  sqflite: ^2.2.8+4
  path: ^1.9.0
  path_provider: ^2.1.3

  # Networking & data
  http: ^1.2.1
  csv: ^6.0.0

  # Location
  geolocator: ^13.0.1

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # State management
  provider: ^6.1.2

  # Persistence
  shared_preferences: ^2.3.2

  # Background service & notifications
  flutter_foreground_task: ^8.14.0

  # Bluetooth (Icom CI-V BLE scanner control — beta)
  flutter_blue_plus: ^1.35.3

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.3.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/
