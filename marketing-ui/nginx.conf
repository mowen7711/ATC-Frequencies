# ATC Frequencies marketing UI
# Drop at /etc/nginx/sites-available/atc-marketing-ui and symlink to sites-enabled.
# Binds ONLY to the Tailscale IP — unreachable from the public internet.

server {
    listen 100.103.65.20:8090;

    # Belt-and-suspenders: only Tailscale CGNAT range
    allow 100.64.0.0/10;
    deny all;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Generous timeout for Claude API generate calls (~10s)
        proxy_read_timeout 60s;
    }
}
