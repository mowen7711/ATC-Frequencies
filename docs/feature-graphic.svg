<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500">
  <defs>
    <radialGradient id="bgGrad" cx="30%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#152038"/>
      <stop offset="100%" stop-color="#080d18"/>
    </radialGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFB300" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFB300" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="planeGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FFC926"/>
      <stop offset="100%" stop-color="#E8A000"/>
    </radialGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="bounds">
      <rect width="1024" height="500"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1024" height="500" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <g stroke="#1a2d4a" stroke-width="0.5" opacity="0.6" clip-path="url(#bounds)">
    <line x1="0" y1="100" x2="1024" y2="100"/>
    <line x1="0" y1="200" x2="1024" y2="200"/>
    <line x1="0" y1="300" x2="1024" y2="300"/>
    <line x1="0" y1="400" x2="1024" y2="400"/>
    <line x1="128" y1="0" x2="128" y2="500"/>
    <line x1="256" y1="0" x2="256" y2="500"/>
    <line x1="384" y1="0" x2="384" y2="500"/>
    <line x1="512" y1="0" x2="512" y2="500"/>
    <line x1="640" y1="0" x2="640" y2="500"/>
    <line x1="768" y1="0" x2="768" y2="500"/>
    <line x1="896" y1="0" x2="896" y2="500"/>
  </g>

  <!-- Large glow behind plane -->
  <ellipse cx="200" cy="250" rx="260" ry="220" fill="url(#glowGrad)"/>

  <!-- ── Plane (top-down, scaled & centred left) ── -->
  <g transform="translate(96, 60) scale(0.6)" filter="url(#softGlow)">
    <!-- Signal arcs -->
    <path d="M 180 620 A 360 360 0 0 1 844 620" stroke="#FFB300" stroke-width="22" fill="none" stroke-opacity="0.10" stroke-linecap="round"/>
    <path d="M 264 620 A 268 268 0 0 1 760 620" stroke="#FFB300" stroke-width="22" fill="none" stroke-opacity="0.18" stroke-linecap="round"/>
    <path d="M 350 620 A 178 178 0 0 1 674 620" stroke="#FFB300" stroke-width="22" fill="none" stroke-opacity="0.30" stroke-linecap="round"/>
    <!-- Fuselage -->
    <path d="M 512 148 C 522 148, 544 175, 552 228 C 560 278, 563 338, 563 405 C 563 478, 561 558, 557 635 C 553 700, 545 756, 534 808 C 526 842, 519 868, 512 882 C 505 868, 498 842, 490 808 C 479 756, 471 700, 467 635 C 463 558, 461 478, 461 405 C 461 338, 464 278, 472 228 C 480 175, 502 148, 512 148 Z" fill="url(#planeGrad)"/>
    <!-- Right wing -->
    <path d="M 558 398 C 620 402, 730 432, 878 508 L 866 562 C 780 532, 672 506, 562 468 C 562 468, 560 460, 558 445 Z" fill="url(#planeGrad)"/>
    <!-- Left wing -->
    <path d="M 466 398 C 404 402, 294 432, 146 508 L 158 562 C 244 532, 352 506, 462 468 C 462 468, 464 460, 466 445 Z" fill="url(#planeGrad)"/>
    <!-- Right engine -->
    <path d="M 774 446 C 796 444, 816 456, 818 480 L 818 510 C 816 533, 796 544, 774 542 L 744 542 C 722 542, 710 532, 710 510 L 710 480 C 710 458, 722 446, 744 446 Z" fill="#CC8500" transform="rotate(19 764 494)"/>
    <ellipse cx="764" cy="454" rx="14" ry="10" fill="#080d18" opacity="0.6" transform="rotate(19 764 454)"/>
    <!-- Left engine -->
    <path d="M 250 446 C 272 444, 284 458, 284 480 L 284 510 C 284 532, 272 542, 250 542 L 220 542 C 198 542, 188 532, 188 510 L 188 480 C 188 456, 198 444, 220 446 Z" fill="#CC8500" transform="rotate(-19 236 494)"/>
    <ellipse cx="262" cy="454" rx="14" ry="10" fill="#080d18" opacity="0.6" transform="rotate(-19 262 454)"/>
    <!-- Right stabilizer -->
    <path d="M 552 802 C 590 804, 660 816, 710 836 L 702 860 C 655 844, 586 834, 552 832 Z" fill="url(#planeGrad)"/>
    <!-- Left stabilizer -->
    <path d="M 472 802 C 434 804, 364 816, 314 836 L 322 860 C 369 844, 438 834, 472 832 Z" fill="url(#planeGrad)"/>
    <!-- Cockpit -->
    <ellipse cx="512" cy="248" rx="16" ry="22" fill="#080d18" opacity="0.50"/>
    <ellipse cx="512" cy="285" rx="13" ry="12" fill="#080d18" opacity="0.30"/>
  </g>

  <!-- ── App name ── -->
  <text x="420" y="178" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="68" font-weight="800" fill="#FFB300" letter-spacing="-1">ATC</text>
  <text x="420" y="255" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="68" font-weight="800" fill="#ffffff" letter-spacing="-1">Frequencies</text>

  <!-- Tagline -->
  <text x="422" y="298" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="22" font-weight="400" fill="#7a9bbf" letter-spacing="0.5">
    Worldwide airport frequencies in your pocket
  </text>

  <!-- Divider -->
  <line x1="420" y1="326" x2="980" y2="326" stroke="#1e3050" stroke-width="1"/>

  <!-- ── Frequency chips ── -->
  <!-- TWR -->
  <rect x="420" y="346" width="138" height="56" rx="8" fill="#1a2d4a" stroke="#2a4068" stroke-width="1"/>
  <text x="436" y="368" font-family="monospace" font-size="11" font-weight="700" fill="#ef5350" letter-spacing="1">TWR</text>
  <text x="436" y="390" font-family="monospace" font-size="18" font-weight="700" fill="#e8edf5">118.300</text>

  <!-- GND -->
  <rect x="572" y="346" width="138" height="56" rx="8" fill="#1a2d4a" stroke="#2a4068" stroke-width="1"/>
  <text x="588" y="368" font-family="monospace" font-size="11" font-weight="700" fill="#ffd54f" letter-spacing="1">GND</text>
  <text x="588" y="390" font-family="monospace" font-size="18" font-weight="700" fill="#e8edf5">121.900</text>

  <!-- ATIS -->
  <rect x="724" y="346" width="138" height="56" rx="8" fill="#1a2d4a" stroke="#2a4068" stroke-width="1"/>
  <text x="740" y="368" font-family="monospace" font-size="11" font-weight="700" fill="#64b5f6" letter-spacing="1">ATIS</text>
  <text x="740" y="390" font-family="monospace" font-size="18" font-weight="700" fill="#e8edf5">128.175</text>

  <!-- APP -->
  <rect x="876" y="346" width="108" height="56" rx="8" fill="#1a2d4a" stroke="#2a4068" stroke-width="1"/>
  <text x="892" y="368" font-family="monospace" font-size="11" font-weight="700" fill="#ff9800" letter-spacing="1">APP</text>
  <text x="892" y="390" font-family="monospace" font-size="18" font-weight="700" fill="#e8edf5">119.725</text>

  <!-- ── Bottom row ── -->
  <!-- ILS chip -->
  <rect x="420" y="420" width="180" height="48" rx="8" fill="#0d1e35" stroke="#1a3a5c" stroke-width="1"/>
  <text x="436" y="440" font-family="monospace" font-size="10" font-weight="700" fill="#64b5f6" letter-spacing="1">ILS RWY 27L</text>
  <text x="436" y="458" font-family="monospace" font-size="15" font-weight="600" fill="#90caf9">109.500 MHz</text>

  <!-- Nearby badge -->
  <rect x="616" y="420" width="200" height="48" rx="8" fill="#0d1e35" stroke="#1a3a5c" stroke-width="1"/>
  <text x="632" y="440" font-family="-apple-system, sans-serif" font-size="10" font-weight="700" fill="#81c784" letter-spacing="0.5">● NEARBY</text>
  <text x="632" y="458" font-family="-apple-system, sans-serif" font-size="14" font-weight="600" fill="#a5d6a7">EGCC · 3.2 km</text>

  <!-- Favourites badge -->
  <rect x="832" y="420" width="152" height="48" rx="8" fill="#0d1e35" stroke="#1a3a5c" stroke-width="1"/>
  <text x="848" y="440" font-family="-apple-system, sans-serif" font-size="10" font-weight="700" fill="#FFB300" letter-spacing="0.5">★ FAVOURITE</text>
  <text x="848" y="458" font-family="-apple-system, sans-serif" font-size="14" font-weight="600" fill="#ffd54f">EGLL · Heathrow</text>

</svg>
