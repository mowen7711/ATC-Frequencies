name: Play Store Metrics Sync

on:
  schedule:
    # Runs at 06:00 UTC daily — Play Console exports land overnight
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions tab

jobs:
  sync:
    name: Sync GCS stats to NeonDB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: metrics-relay/package-lock.json

      - name: Install dependencies
        working-directory: metrics-relay
        run: npm ci

      - name: Write service account credentials
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          echo "$GOOGLE_CREDENTIALS_JSON" > /tmp/service-account.json

      - name: Run sync
        working-directory: metrics-relay
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/service-account.json
          GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: npm run sync

      - name: Clean up credentials
        if: always()
        run: rm -f /tmp/service-account.json
